<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0b0b">
<meta http-equiv="Cache-Control" content="no-cache">
<meta http-equiv="Pragma" content="no-cache">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='25' font-size='24'%3E%E2%9A%AA%3C/text%3E%3C/svg%3E">

<!-- 关键资源从 jsDelivr CDN 拉（国内直连比 github.io 快 5 倍） -->
<link rel="modulepreload" href="https://cdn.jsdelivr.net/gh/hypnotist5202-pixel/bishe-3d-viewer@699bbf0/assets/model-viewer.min.js" crossorigin fetchpriority="high">
<link rel="preload" as="fetch" href="https://cdn.jsdelivr.net/gh/hypnotist5202-pixel/bishe-3d-viewer@699bbf0/assets/combined.glb" crossorigin="anonymous" fetchpriority="high">
<link rel="preload" as="fetch" href="https://cdn.jsdelivr.net/gh/hypnotist5202-pixel/bishe-3d-viewer@699bbf0/assets/exploded-v.glb" crossorigin="anonymous">
<link rel="preload" as="fetch" href="https://cdn.jsdelivr.net/gh/hypnotist5202-pixel/bishe-3d-viewer@699bbf0/assets/exploded-h.glb" crossorigin="anonymous">
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

<title>无障碍药盒 · 3D 预览 | 欧阳天麒</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; overscroll-behavior: none; touch-action: none; background: #0b0b0b; color: #eaeaea; font: 14px/1.5 -apple-system, "PingFang SC", "Helvetica Neue", system-ui, sans-serif; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  body { position: fixed; width: 100%; display: grid; grid-template-rows: auto 1fr auto; }

  header { display: flex; gap: 8px; padding: 14px 10px 8px; justify-content: center; flex-wrap: wrap; z-index: 10; }
  .btn { background: rgba(28,28,28,.86); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid #2a2a2a; color: #c8c8c8; padding: 9px 18px; border-radius: 999px; font: inherit; font-size: 13px; letter-spacing: .04em; cursor: pointer; transition: all .2s ease; white-space: nowrap; }
  .btn.on { background: #f2f2f2; color: #0b0b0b; border-color: #f2f2f2; box-shadow: 0 6px 18px rgba(255,255,255,.08); }
  .btn[disabled] { opacity: .5; cursor: wait; }

  .stage { position: relative; overflow: hidden; background: radial-gradient(ellipse at center, #181818 0%, #0b0b0b 70%); }
  model-viewer { width: 100%; height: 100%; background: transparent; display: block; }

  /* 全屏居中加载 overlay */
  .loader { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; pointer-events: none; transition: opacity .4s ease; z-index: 5; }
  .loader.done { opacity: 0; pointer-events: none; }
  .ring { position: relative; width: 92px; height: 92px; }
  .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring .track { fill: none; stroke: #1e1e1e; stroke-width: 4; }
  .ring .fg { fill: none; stroke: #f2f2f2; stroke-width: 4; stroke-dasharray: 276; stroke-dashoffset: 276; stroke-linecap: round; transition: stroke-dashoffset .3s ease; }
  .ring .pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 500; color: #f0f0f0; letter-spacing: .02em; }
  .loader-text { font-size: 12px; color: #888; letter-spacing: .2em; text-transform: uppercase; }
  .loader-stage { font-size: 11px; color: #555; letter-spacing: .14em; margin-top: -14px; }

  footer { text-align: center; padding: 10px 10px 16px; font-size: 11px; color: #555; letter-spacing: .18em; text-transform: uppercase; }

</style>
</head>
<body>

<header>
  <button class="btn on" data-src="https://cdn.jsdelivr.net/gh/hypnotist5202-pixel/bishe-3d-viewer@699bbf0/assets/combined.glb" disabled>成品</button>
  <button class="btn" data-src="https://cdn.jsdelivr.net/gh/hypnotist5202-pixel/bishe-3d-viewer@699bbf0/assets/exploded-v.glb" disabled>纵向拆解</button>
  <button class="btn" data-src="https://cdn.jsdelivr.net/gh/hypnotist5202-pixel/bishe-3d-viewer@699bbf0/assets/exploded-h.glb" disabled>横向分布</button>
</header>

<div class="stage">
  <model-viewer
    id="mv"
    alt="无障碍药盒 3D"
    camera-controls
    touch-action="none"
    disable-tap
    interaction-prompt="none"
    loading="eager"
    reveal="auto"
    environment-image="neutral"
    shadow-intensity="1.3"
    shadow-softness="0.7"
    exposure="0.85"
    bounds="tight"
    camera-orbit="25deg 68deg 95%"
    field-of-view="30deg"
    min-camera-orbit="auto auto 55%"
    max-camera-orbit="auto auto 260%">
  </model-viewer>

  <div class="loader" id="loader">
    <div class="ring">
      <svg viewBox="0 0 100 100">
        <circle class="track" cx="50" cy="50" r="44"></circle>
        <circle class="fg" id="ringFg" cx="50" cy="50" r="44"></circle>
      </svg>
      <div class="pct" id="pct">0%</div>
    </div>
    <div class="loader-text">加载 3D 模型</div>
    <div class="loader-stage" id="loaderStage">初始化引擎中...</div>
  </div>
</div>

<footer>欧阳天麒 · 无障碍药盒 · 浙江理工大学产品设计 2026</footer>

<!-- model-viewer JS 从 jsDelivr CDN 加载（国内加速） -->
<script type="module" async crossorigin src="https://cdn.jsdelivr.net/gh/hypnotist5202-pixel/bishe-3d-viewer@699bbf0/assets/model-viewer.min.js"
  onerror="document.getElementById('loaderStage').textContent = '✗ 引擎下载失败，请刷新或检查网络'"></script>

<script>
(() => {
  const mv = document.getElementById('mv');
  const loader = document.getElementById('loader');
  const ringFg = document.getElementById('ringFg');
  const pctEl = document.getElementById('pct');
  const stageEl = document.getElementById('loaderStage');
  const btns = document.querySelectorAll('header .btn');
  const CIRCUM = 276;

  let jsLoaded = false;
  let glbLoaded = false;

  function setProgress(p, stage) {
    p = Math.max(0, Math.min(1, p));
    ringFg.style.strokeDashoffset = String(CIRCUM * (1 - p));
    pctEl.textContent = Math.round(p * 100) + '%';
    if (stage) stageEl.textContent = stage;
  }

  function hideLoader() {
    setProgress(1);
    setTimeout(() => loader.classList.add('done'), 200);
    btns.forEach(b => b.disabled = false);
  }

  // 按钮切换
  btns.forEach(b => b.addEventListener('click', () => {
    if (b.classList.contains('on') || b.disabled) return;
    btns.forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    mv.setAttribute('src', b.dataset.src);
  }));

  // model-viewer progress 事件（glb 下载+解析）
  mv.addEventListener('progress', (e) => {
    const p = e.detail.totalProgress || 0;
    // JS 已就绪之后，进度映射到 30%~100%
    const displayed = jsLoaded ? (0.3 + p * 0.7) : 0.3 * p;
    setProgress(displayed, p < 1 ? '载入模型 ' + Math.round(p*100) + '%' : '渲染中...');
  });
  mv.addEventListener('load', () => {
    glbLoaded = true;
    if (mv.updateFraming) mv.updateFraming();
    hideLoader();
  }, { once: true });

  // JS 加载进度监控：轮询 customElements
  let jsProgress = 0;
  const jsTick = setInterval(() => {
    jsProgress = Math.min(0.28, jsProgress + 0.015);
    if (!jsLoaded) setProgress(jsProgress, '加载 3D 引擎...');
  }, 180);

  (async () => {
    try {
      if (!window.customElements || !customElements.get('model-viewer')) {
        await customElements.whenDefined('model-viewer');
      }
      jsLoaded = true;
      clearInterval(jsTick);
      setProgress(0.3, '引擎就绪，载入模型...');
      mv.setAttribute('src', 'https://cdn.jsdelivr.net/gh/hypnotist5202-pixel/bishe-3d-viewer@699bbf0/assets/combined.glb');
    } catch (e) {
      stageEl.textContent = '引擎加载失败，请用浏览器打开';
    }
  })();

  // 超时降级（20 秒）
  setTimeout(() => {
    if (!glbLoaded) {
      stageEl.innerHTML = '网络较慢，建议用<br>浏览器打开（右上···菜单）';
    }
  }, 20000);
})();
</script>

</body>
</html>
