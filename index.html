<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0b0b">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='25' font-size='24'%3E%E2%9A%AA%3C/text%3E%3C/svg%3E">
<link rel="preload" as="fetch" href="assets/combined.glb" crossorigin="anonymous" fetchpriority="high">
<link rel="preload" as="fetch" href="assets/exploded.glb" crossorigin="anonymous">
<title>无碍药盒 · 3D 预览 | 欧阳天麒</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; overscroll-behavior: none; touch-action: none; background: #0b0b0b; color: #eaeaea; font: 14px/1.5 -apple-system, "PingFang SC", "Helvetica Neue", system-ui, sans-serif; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  body { position: fixed; width: 100%; }

  /* 首屏 intro（极简，立即可见，0 JS 依赖） */
  .intro { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; background: radial-gradient(ellipse at center, #1a1a1a 0%, #0b0b0b 70%); opacity: 1; transition: opacity .35s ease; }
  .intro.hide { opacity: 0; pointer-events: none; }
  .mock { width: min(58vw, 280px); aspect-ratio: 1; border-radius: 50%; background: radial-gradient(circle at 35% 28%, #fafafa 0%, #c8c8c8 55%, #7a7a7a 100%); box-shadow: 0 40px 90px rgba(0,0,0,.7), inset 0 -25px 50px rgba(0,0,0,.18); position: relative; margin-bottom: 44px; }
  .mock::before { content: ''; position: absolute; inset: 14%; border-radius: 50%; background: linear-gradient(135deg, #e8e8e8 0%, #9a9a9a 100%); box-shadow: inset 0 8px 20px rgba(255,255,255,.18), inset 0 -8px 20px rgba(0,0,0,.2); }
  .mock::after { content: ''; position: absolute; top: 20%; left: 32%; width: 32%; height: 32%; border-radius: 50%; background: rgba(255,255,255,.55); filter: blur(22px); }
  .title { font-size: 22px; font-weight: 500; letter-spacing: .1em; margin: 0 0 6px; color: #f0f0f0; }
  .sub { font-size: 12px; color: #888; letter-spacing: .14em; margin: 0 0 36px; }
  .cta { background: #f2f2f2; color: #0b0b0b; border: none; padding: 15px 36px; border-radius: 999px; font: 500 14px/1 inherit; letter-spacing: .08em; cursor: pointer; box-shadow: 0 14px 32px rgba(255,255,255,.14); transition: transform .15s ease, background .2s ease; }
  .cta:active { transform: scale(.96); }
  .cta[disabled] { background: #444; color: #999; cursor: wait; box-shadow: none; }
  .cta .arrow { display: inline-block; margin-right: 6px; transform: translateY(-1px); }
  .hint { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #555; letter-spacing: .14em; }

  /* 舞台 */
  .stage { position: fixed; inset: 0; display: none; grid-template-rows: auto 1fr auto; }
  .stage.show { display: grid; }
  header { display: flex; gap: 10px; padding: 16px 12px 8px; justify-content: center; z-index: 10; }
  .btn { background: rgba(28,28,28,.82); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid #2a2a2a; color: #c8c8c8; padding: 10px 22px; border-radius: 999px; cursor: pointer; font: inherit; letter-spacing: .04em; transition: all .2s ease; }
  .btn.on { background: #f2f2f2; color: #0b0b0b; border-color: #f2f2f2; box-shadow: 0 8px 24px rgba(255,255,255,.08); }
  model-viewer { width: 100%; height: 100%; background: radial-gradient(ellipse at center, #181818 0%, #0b0b0b 70%); }
  footer { text-align: center; padding: 12px 10px 18px; font-size: 11px; color: #555; letter-spacing: .18em; text-transform: uppercase; }
  .progress-wrap { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
  .progress-ring { width: 48px; height: 48px; transform: rotate(-90deg); }
  .progress-ring circle { fill: none; stroke-width: 3; }
  .progress-ring .bg { stroke: #222; }
  .progress-ring .fg { stroke: #eaeaea; stroke-dasharray: 138; stroke-dashoffset: 138; stroke-linecap: round; transition: stroke-dashoffset .25s ease; }
  .progress-text { margin-top: 10px; font-size: 11px; color: #777; letter-spacing: .12em; }
</style>
</head>
<body>

<!-- 首屏：0 JS 依赖，HTML 解析即显示 -->
<div class="intro" id="intro">
  <div class="mock"></div>
  <h1 class="title">无碍药盒</h1>
  <p class="sub">3D 交互预览 · 欧阳天麒 · 中国计量大学 2026</p>
  <button class="cta" id="btnStart"><span class="arrow">▸</span>查看 3D 模型</button>
  <div class="hint">点击后可 360° 旋转 · 双指缩放 · 切换爆炸图</div>
</div>

<!-- 舞台：点击后才显示并启动 model-viewer -->
<div class="stage" id="stage">
  <header>
    <button class="btn on" data-src="assets/combined.glb">成品</button>
    <button class="btn" data-src="assets/exploded.glb">爆炸图</button>
  </header>
  <model-viewer
    id="mv"
    alt="无碍药盒 3D 模型"
    camera-controls
    touch-action="none"
    disable-tap
    interaction-prompt="none"
    loading="eager"
    reveal="auto"
    ar
    ar-modes="webxr scene-viewer quick-look"
    environment-image="neutral"
    shadow-intensity="1.1"
    shadow-softness="0.8"
    exposure="1.05"
    bounds="tight"
    camera-orbit="25deg 68deg 95%"
    field-of-view="30deg"
    min-camera-orbit="auto auto 55%"
    max-camera-orbit="auto auto 260%">
    <div class="progress-wrap" slot="progress-bar">
      <svg class="progress-ring" viewBox="0 0 48 48">
        <circle class="bg" cx="24" cy="24" r="22"></circle>
        <circle class="fg" cx="24" cy="24" r="22"></circle>
      </svg>
      <div class="progress-text">加载中 <span id="pct">0</span>%</div>
    </div>
  </model-viewer>
  <footer>欧阳天麒 · 无碍药盒 · 中国计量大学 2026</footer>
</div>

<!-- async 脚本：下载期间不阻塞首屏，用户看 intro 时后台拉 -->
<script type="module" async src="assets/model-viewer.min.js"></script>

<script>
(() => {
  const intro = document.getElementById('intro');
  const stage = document.getElementById('stage');
  const btnStart = document.getElementById('btnStart');
  const mv = document.getElementById('mv');

  async function startStage() {
    btnStart.disabled = true;
    btnStart.innerHTML = '<span class="arrow">◌</span>准备中...';
    // 等 model-viewer custom element 注册完（JS 可能还在下载）
    if (!window.customElements || !customElements.get('model-viewer')) {
      await customElements.whenDefined('model-viewer');
    }
    mv.setAttribute('src', 'assets/combined.glb');
    intro.classList.add('hide');
    stage.classList.add('show');
    setTimeout(() => intro.style.display = 'none', 400);
  }
  btnStart.addEventListener('click', startStage);

  // 按钮切换
  stage.querySelectorAll('.btn').forEach(b => {
    b.addEventListener('click', () => {
      if (b.classList.contains('on')) return;
      stage.querySelectorAll('.btn').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      mv.setAttribute('src', b.dataset.src);
    });
  });

  // 进度条 + load 隐藏
  const wrap = mv.querySelector('.progress-wrap');
  const ring = mv.querySelector('.progress-ring .fg');
  const pct = mv.querySelector('#pct');
  mv.addEventListener('progress', (e) => {
    const p = Math.max(0, Math.min(1, e.detail.totalProgress || 0));
    if (ring) ring.style.strokeDashoffset = String(138 * (1 - p));
    if (pct) pct.textContent = Math.round(p * 100);
    if (p >= 1 && wrap) wrap.style.display = 'none';
  });
  mv.addEventListener('load', () => {
    if (wrap) wrap.style.display = 'none';
    mv.updateFraming && mv.updateFraming();
  });
})();
</script>

</body>
</html>
