<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=4,viewport-fit=cover">
<meta name="theme-color" content="#0b0b0b">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='25' font-size='24'%3E%E2%9A%AA%3C/text%3E%3C/svg%3E">
<link rel="preload" as="image" href="assets/poster-combined.webp" fetchpriority="high">
<link rel="preload" as="image" href="assets/poster-exploded.webp">
<title>无碍药盒 · 欧阳天麒 · 中国计量大学 2026</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #0b0b0b; color: #eaeaea; font: 14px/1.5 -apple-system, "PingFang SC", "Helvetica Neue", system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  body { display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }
  header { display: flex; gap: 10px; padding: 14px 12px 8px; justify-content: center; z-index: 10; }
  .btn { background: rgba(28,28,28,.86); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid #2a2a2a; color: #c8c8c8; padding: 9px 24px; border-radius: 999px; font: inherit; letter-spacing: .04em; cursor: pointer; transition: all .2s ease; }
  .btn.on { background: #f2f2f2; color: #0b0b0b; border-color: #f2f2f2; box-shadow: 0 6px 18px rgba(255,255,255,.08); }
  .stage { flex: 1; position: relative; overflow: hidden; background: radial-gradient(ellipse at center, #181818 0%, #0b0b0b 70%); }
  .stage img { width: 100%; height: 100%; object-fit: contain; user-select: none; -webkit-user-select: none; -webkit-user-drag: none; pointer-events: auto; }
  .stage img.fade { transition: opacity .18s ease; }
  .hint { position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #666; letter-spacing: .14em; pointer-events: none; white-space: nowrap; }
  footer { text-align: center; padding: 10px 10px 16px; font-size: 11px; color: #555; letter-spacing: .18em; text-transform: uppercase; }
  .mode3d-btn { position: absolute; bottom: 14px; right: 14px; background: rgba(40,40,40,.88); backdrop-filter: blur(10px); color: #ccc; font-size: 11px; padding: 8px 14px; border: 1px solid #3a3a3a; border-radius: 999px; cursor: pointer; letter-spacing: .05em; transition: all .2s; }
  .mode3d-btn:active { transform: scale(.96); }
  .mode3d-btn[disabled] { opacity: .6; cursor: wait; }
  model-viewer { width: 100%; height: 100%; background: transparent; display: block; --poster-color: transparent; }
  .loading-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 32px; height: 32px; border: 2px solid #2a2a2a; border-top-color: #eaeaea; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
  .loading-ring.on { display: block; }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
</style>
</head>
<body>

<header>
  <button class="btn on" data-poster="assets/poster-combined.webp" data-glb="assets/combined.glb" data-label="成品">成品</button>
  <button class="btn" data-poster="assets/poster-exploded.webp" data-glb="assets/exploded.glb" data-label="爆炸图">爆炸图</button>
</header>

<div class="stage" id="stage">
  <img id="poster" class="fade" src="assets/poster-combined.webp" alt="无碍药盒 成品">
  <div class="loading-ring" id="ring"></div>
  <div class="hint" id="hint">双指缩放看细节 · 上方切换爆炸图</div>
  <button class="mode3d-btn" id="btn3d">▸ 3D 交互</button>
</div>

<footer>欧阳天麒 · 无碍药盒 · 中国计量大学 2026</footer>

<script>
(() => {
  const poster = document.getElementById('poster');
  const stage = document.getElementById('stage');
  const btns = document.querySelectorAll('header .btn');
  const btn3d = document.getElementById('btn3d');
  const ring = document.getElementById('ring');
  const hint = document.getElementById('hint');
  let mode3d = false;
  let currentGlb = 'assets/combined.glb';
  let currentPoster = 'assets/poster-combined.webp';

  // 顶部按钮切换
  btns.forEach(b => b.addEventListener('click', () => {
    if (b.classList.contains('on')) return;
    btns.forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    currentGlb = b.dataset.glb;
    currentPoster = b.dataset.poster;
    if (mode3d) {
      const mv = document.getElementById('mv');
      if (mv) mv.setAttribute('src', currentGlb);
    } else {
      poster.src = currentPoster;
    }
  }));

  // 3D 交互模式按钮
  btn3d.addEventListener('click', async () => {
    if (mode3d) return;
    btn3d.textContent = '⏳ 加载中...';
    btn3d.disabled = true;
    ring.classList.add('on');

    // 动态加载 model-viewer
    try {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.type = 'module';
        s.src = 'assets/model-viewer.min.js';
        s.onerror = () => reject(new Error('script load error'));
        document.head.appendChild(s);
        const timeout = setTimeout(() => reject(new Error('timeout')), 20000);
        const check = () => {
          if (window.customElements && customElements.get('model-viewer')) {
            clearTimeout(timeout);
            resolve();
          } else setTimeout(check, 120);
        };
        check();
      });
    } catch (e) {
      ring.classList.remove('on');
      btn3d.textContent = '加载失败，继续看图';
      btn3d.disabled = false;
      setTimeout(() => { btn3d.textContent = '▸ 重试 3D'; btn3d.disabled = false; }, 3000);
      return;
    }

    // 创建 model-viewer
    const mv = document.createElement('model-viewer');
    mv.id = 'mv';
    mv.setAttribute('src', currentGlb);
    mv.setAttribute('alt', '无碍药盒 3D');
    mv.setAttribute('camera-controls', '');
    mv.setAttribute('touch-action', 'none');
    mv.setAttribute('disable-tap', '');
    mv.setAttribute('interaction-prompt', 'none');
    mv.setAttribute('environment-image', 'neutral');
    mv.setAttribute('shadow-intensity', '1.1');
    mv.setAttribute('shadow-softness', '0.8');
    mv.setAttribute('exposure', '1.05');
    mv.setAttribute('bounds', 'tight');
    mv.setAttribute('camera-orbit', '25deg 68deg 95%');
    mv.setAttribute('field-of-view', '30deg');
    mv.setAttribute('min-camera-orbit', 'auto auto 55%');
    mv.setAttribute('max-camera-orbit', 'auto auto 260%');
    stage.insertBefore(mv, hint);
    mv.addEventListener('load', () => {
      ring.classList.remove('on');
      poster.style.display = 'none';
      btn3d.textContent = '● 3D 已开启';
      hint.textContent = '拖动旋转 · 双指缩放 · 上方切换';
      mode3d = true;
    }, { once: true });
    mv.addEventListener('error', () => {
      ring.classList.remove('on');
      btn3d.textContent = '3D 加载失败';
      btn3d.disabled = false;
    }, { once: true });
  });
})();
</script>

</body>
</html>
