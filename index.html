<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0b0b">
<meta http-equiv="Cache-Control" content="no-cache">
<meta http-equiv="Pragma" content="no-cache">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='25' font-size='24'%3E%E2%9A%AA%3C/text%3E%3C/svg%3E">

<script>
  // 本地开发时用相对路径，线上用 jsDelivr CDN（deploy.sh 会把 hash pin 到当前 commit）
  window.__IS_LOCAL__ = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  window.__CDN_BASE__ = window.__IS_LOCAL__
    ? './assets'
    : 'https://cdn.jsdelivr.net/gh/hypnotist5202-pixel/bishe-3d-viewer@83d5d1a/assets';
  window.__GLB_COMBINED__ = window.__CDN_BASE__ + '/combined.glb';
  window.__JS_MODELVIEWER__ = window.__CDN_BASE__ + '/model-viewer.min.js';
</script>
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

<title>无障碍药盒 · 3D 预览 | 欧阳天麒</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; overscroll-behavior: none; touch-action: none; background: #0b0b0b; color: #eaeaea; font: 14px/1.5 -apple-system, "PingFang SC", "Helvetica Neue", system-ui, sans-serif; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  body { position: fixed; width: 100%; display: grid; grid-template-rows: auto 1fr auto; }

  header { display: flex; gap: 8px; padding: 14px 10px 8px; justify-content: center; flex-wrap: wrap; z-index: 10; }
  .btn { background: rgba(28,28,28,.86); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid #2a2a2a; color: #c8c8c8; padding: 9px 18px; border-radius: 999px; font: inherit; font-size: 13px; letter-spacing: .04em; cursor: pointer; transition: all .2s ease; white-space: nowrap; }
  .btn.on { background: #f2f2f2; color: #0b0b0b; border-color: #f2f2f2; box-shadow: 0 6px 18px rgba(255,255,255,.08); }
  .btn[disabled] { opacity: .5; cursor: wait; }

  .btn.play { background: rgba(242, 115, 28, .14); border-color: rgba(242, 115, 28, .35); color: #f2731c; }
  .btn.play.on { background: #f2731c; color: #0b0b0b; border-color: #f2731c; box-shadow: 0 6px 20px rgba(242, 115, 28, .35); }
  .btn.play .dot { display: inline-block; width: 7px; height: 7px; border-radius: 999px; background: currentColor; margin-right: 6px; vertical-align: middle; animation: pulse 1.2s ease-in-out infinite; opacity: 0; }
  .btn.play.on .dot { opacity: 1; }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: .6; } }

  .stage { position: relative; overflow: hidden; background: radial-gradient(ellipse at center, #181818 0%, #0b0b0b 70%); }
  model-viewer { width: 100%; height: 100%; background: transparent; display: block; }

  /* 阶段提示（右下角） */
  .phase { position: absolute; right: 14px; bottom: 14px; font-size: 11px; color: #888; letter-spacing: .2em; text-transform: uppercase; padding: 6px 12px; background: rgba(0,0,0,.45); border-radius: 999px; backdrop-filter: blur(10px); opacity: 0; transition: opacity .3s ease; pointer-events: none; }
  .phase.show { opacity: 1; }

  .loader { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; pointer-events: none; transition: opacity .4s ease; z-index: 5; }
  .loader.done { opacity: 0; pointer-events: none; }
  .ring { position: relative; width: 92px; height: 92px; }
  .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring .track { fill: none; stroke: #1e1e1e; stroke-width: 4; }
  .ring .fg { fill: none; stroke: #f2f2f2; stroke-width: 4; stroke-dasharray: 276; stroke-dashoffset: 276; stroke-linecap: round; transition: stroke-dashoffset .3s ease; }
  .ring .pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 500; color: #f0f0f0; letter-spacing: .02em; }
  .loader-text { font-size: 12px; color: #888; letter-spacing: .2em; text-transform: uppercase; }
  .loader-stage { font-size: 11px; color: #555; letter-spacing: .14em; margin-top: -14px; }

  footer { text-align: center; padding: 10px 10px 16px; font-size: 11px; color: #555; letter-spacing: .18em; text-transform: uppercase; }
</style>
</head>
<body>

<header>
  <button class="btn on" id="btnAssembled" disabled>成品</button>
  <button class="btn play" id="demoBtn" disabled><span class="dot"></span><span id="demoLabel">按压出药</span></button>
</header>

<div class="stage">
  <model-viewer
    id="mv"
    alt="无障碍药盒 3D"
    camera-controls
    touch-action="none"
    disable-tap
    interaction-prompt="none"
    loading="eager"
    reveal="auto"
    environment-image="neutral"
    shadow-intensity="1.3"
    shadow-softness="0.7"
    exposure="0.85"
    camera-orbit="25deg 68deg 0.45m"
    field-of-view="28deg"
    interpolation-decay="200"
    min-camera-orbit="auto auto 0.2m"
    max-camera-orbit="auto auto 1m">
  </model-viewer>

  <div class="phase" id="phaseLabel"></div>

  <div class="loader" id="loader">
    <div class="ring">
      <svg viewBox="0 0 100 100">
        <circle class="track" cx="50" cy="50" r="44"></circle>
        <circle class="fg" id="ringFg" cx="50" cy="50" r="44"></circle>
      </svg>
      <div class="pct" id="pct">0%</div>
    </div>
    <div class="loader-text">加载 3D 模型</div>
    <div class="loader-stage" id="loaderStage">初始化引擎中...</div>
  </div>
</div>

<footer>欧阳天麒 · 无障碍药盒 · 浙江理工大学产品设计 2026</footer>

<script>
  // 动态注入 model-viewer script tag
  (() => {
    const s = document.createElement('script');
    s.type = 'module'; s.async = true; s.crossOrigin = 'anonymous';
    s.src = window.__JS_MODELVIEWER__;
    s.onerror = () => { document.getElementById('loaderStage').textContent = '✗ 引擎下载失败，请刷新或检查网络'; };
    document.head.appendChild(s);
  })();
</script>

<script>
(() => {
  const mv = document.getElementById('mv');
  const loader = document.getElementById('loader');
  const ringFg = document.getElementById('ringFg');
  const pctEl = document.getElementById('pct');
  const stageEl = document.getElementById('loaderStage');
  const phaseLabel = document.getElementById('phaseLabel');
  const btnAssembled = document.getElementById('btnAssembled');
  const demoBtn = document.getElementById('demoBtn');
  const demoLabel = document.getElementById('demoLabel');
  const CIRCUM = 276;

  let jsLoaded = false;
  let glbLoaded = false;

  // ═══════════════════════════════════════════════════════════════
  // 爆炸位移 delta（由 tools/export-deltas.mjs 从 Rhino 原 glb 算出）
  // 单位 m。动画时 group.position = initial + delta * explodeAmount
  // ═══════════════════════════════════════════════════════════════
  const EXPLODE_DELTA = {
    cap:     [0,         0.08445,  0],
    chamber: [0,         0.04359,  0],
    disc:    [0,         0.00172,  0],
    ring:    [0,        -0.05939,  0],
    gear:    [-0.01671, -0.08884,  0],
    shaft:   [ 0.00329, -0.09202,  0],
    pusher:  [0,        -0.11537,  0],
    base:    [0,        -0.14413,  0],
  };
  const PART_NAMES = Object.keys(EXPLODE_DELTA);
  const nodeRefs = {};    // name → three.js Group
  const initialPos = {};  // name → {x,y,z} 装配状态 position（three.js 读出）
  const initialRot = {};  // name → {x,y,z} 装配状态 rotation（three.js 读出）

  // ═══════════════════════════════════════════════════════════════
  // 工具：抓取 model-viewer 内部 scene graph 的 node
  // model-viewer v4 在 load 后暴露 model[0..N] 或 symbol-ref scene，
  // 最稳的方法是 traverse 所有 Object3D 按 name 匹配
  // ═══════════════════════════════════════════════════════════════
  let mvScene = null; // 缓存 three.js scene 引用，用于 queueRender

  function grabNodes() {
    // model-viewer v4 把 three.js Scene 放在 Symbol(scene) 上（private API）
    const sceneSymbol = Object.getOwnPropertySymbols(mv).find(s => String(s) === 'Symbol(scene)');
    if (!sceneSymbol) return false;
    mvScene = mv[sceneSymbol];
    if (!mvScene || typeof mvScene.traverse !== 'function') return false;

    mvScene.traverse((obj) => {
      if (obj.name && PART_NAMES.includes(obj.name) && !nodeRefs[obj.name]) {
        nodeRefs[obj.name] = obj;
        initialPos[obj.name] = { x: obj.position.x, y: obj.position.y, z: obj.position.z };
        initialRot[obj.name] = { x: obj.rotation.x, y: obj.rotation.y, z: obj.rotation.z };
      }
    });

    const found = Object.keys(nodeRefs).length;
    console.log(`[scene-graph] grabbed ${found}/${PART_NAMES.length} nodes:`, Object.keys(nodeRefs));
    return found === PART_NAMES.length;
  }

  function setPartPos(name, dx, dy, dz) {
    const obj = nodeRefs[name];
    const init = initialPos[name];
    if (!obj || !init) return;
    obj.position.set(init.x + dx, init.y + dy, init.z + dz);
  }

  function setPartRotation(name, rx, ry, rz) {
    const obj = nodeRefs[name];
    const base = initialRot[name];
    if (!obj || !base) return;
    obj.rotation.set(base.x + rx, base.y + ry, base.z + rz);
  }

  function requestRender() {
    // model-viewer 空闲时会自动 pause；改 Object3D 后必须显式触发重绘
    if (mvScene && mvScene.queueRender) mvScene.queueRender();
  }

  function refitCamera() { /* 相机距离固定，不再 auto-frame */ }

  // 把所有零件瞬切到指定状态（assembled / exploded）
  function snapToState(state) {
    const t = state === 'exploded' ? 1 : 0;
    for (const name of PART_NAMES) {
      const d = EXPLODE_DELTA[name];
      setPartPos(name, d[0] * t, d[1] * t, d[2] * t);
      setPartRotation(name, 0, 0, 0);
    }
    requestRender();
  }

  // 渐变插值到指定状态（0=assembled, 1=exploded）
  function lerpToState(t) {
    t = Math.max(0, Math.min(1, t));
    for (const name of PART_NAMES) {
      const d = EXPLODE_DELTA[name];
      setPartPos(name, d[0] * t, d[1] * t, d[2] * t);
    }
    requestRender();
  }

  // ═══════════════════════════════════════════════════════════════
  // 按压出药演示 · 每轮 5.3s
  //   wait (0.8s)     待机，模型静止
  //   press (0.6s)    上盖被按压下压 3mm 再回弹（像按按钮）
  //   mechanism(2.4s) 齿轮 + 齿轴旋转 1 圈，送药器沿 X 推出 18mm
  //   release (1.5s)  送药器回位，齿轮继续微转收尾
  // 所有阶段模型保持"成品"状态（零件不分离）
  // ═══════════════════════════════════════════════════════════════
  const easeInOut = t => t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2) / 2;

  const PHASES = [
    { name: 'wait',      dur:  800, label: '待触发' },
    { name: 'press',     dur:  600, label: '按压' },
    { name: 'mechanism', dur: 2400, label: '出药中' },
    { name: 'release',   dur: 1500, label: '回位' },
  ];

  let rafId = null;
  let demoRunning = false;
  let demoStart = 0;

  function setPhaseLabel(text) {
    if (!text) { phaseLabel.classList.remove('show'); return; }
    phaseLabel.textContent = text;
    phaseLabel.classList.add('show');
  }

  function animTick(now) {
    if (!demoRunning) return;
    const elapsed = now - demoStart;
    const cycleDur = PHASES.reduce((s, p) => s + p.dur, 0);
    const cycleT = elapsed % cycleDur;

    // 找当前阶段
    let acc = 0, phase = PHASES[0], phaseT = 0;
    for (const p of PHASES) {
      if (cycleT < acc + p.dur) {
        phase = p;
        phaseT = (cycleT - acc) / p.dur; // 0..1 in phase
        break;
      }
      acc += p.dur;
    }

    // 所有阶段维持成品状态（零件不分离）
    lerpToState(0);

    // —— 上盖按压动作（仅 press 阶段）
    if (phase.name === 'press') {
      // 0→0.5 下压，0.5→1 回弹
      const pressAmt = phaseT < 0.5 ? phaseT * 2 : (1 - phaseT) * 2;
      setPartPos('cap', 0, -pressAmt * 0.003, 0); // 下压 3mm
    } else {
      setPartPos('cap', 0, 0, 0);
    }

    // —— 齿轮 + 齿轴旋转（mechanism + release 连续，共 3.9s 转 1 圈 + release 微调）
    let gearAngle = 0;
    if (phase.name === 'mechanism') {
      gearAngle = easeInOut(phaseT) * Math.PI * 2; // 0 → 1 圈
    } else if (phase.name === 'release') {
      gearAngle = Math.PI * 2 + phaseT * Math.PI * 0.3; // 继续转 54°
    }
    setPartRotation('gear',  0, gearAngle, 0);
    setPartRotation('shaft', 0, gearAngle, 0);

    // —— 送药器推出 + 回位（单程推出 → 回位）
    let pushAmt = 0;
    if (phase.name === 'mechanism') {
      pushAmt = easeInOut(phaseT); // 0 → 1 (推出)
    } else if (phase.name === 'release') {
      pushAmt = 1 - easeInOut(phaseT); // 1 → 0 (回位)
    }
    setPartPos('pusher', pushAmt * 0.018, 0, 0); // 推出 18mm

    requestRender();

    // 阶段文字提示
    setPhaseLabel(phase.label);

    rafId = requestAnimationFrame(animTick);
  }

  function startDemo() {
    if (demoRunning || demoBtn.disabled) return;
    if (Object.keys(nodeRefs).length < PART_NAMES.length) {
      stageEl.textContent = '节点未就绪，正在重试...';
      grabNodes();
      return;
    }
    demoRunning = true;
    demoStart = performance.now();
    demoBtn.classList.add('on');
    demoLabel.textContent = '停止演示';
    btnAssembled.classList.remove('on');
    rafId = requestAnimationFrame(animTick);
  }

  function stopDemo() {
    if (!demoRunning) return;
    demoRunning = false;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    demoBtn.classList.remove('on');
    demoLabel.textContent = '出药流程';
    setPhaseLabel('');
  }

  function setStaticState(state) {
    stopDemo();
    snapToState(state);
    btnAssembled.classList.toggle('on', state === 'assembled');
  }

  // 按钮逻辑 —— 用户手动旋转相机时演示继续跑（不再因 camera-change 停演示）
  btnAssembled.addEventListener('click', () => setStaticState('assembled'));
  demoBtn.addEventListener('click', () => {
    if (demoRunning) { stopDemo(); snapToState('assembled'); btnAssembled.classList.add('on'); }
    else startDemo();
  });

  // ═══ Loader 进度 ═══
  function setProgress(p, stage) {
    p = Math.max(0, Math.min(1, p));
    ringFg.style.strokeDashoffset = String(CIRCUM * (1 - p));
    pctEl.textContent = Math.round(p * 100) + '%';
    if (stage) stageEl.textContent = stage;
  }
  function hideLoader() {
    setProgress(1);
    setTimeout(() => loader.classList.add('done'), 200);
    btnAssembled.disabled = false;
    demoBtn.disabled = false;
  }

  mv.addEventListener('progress', (e) => {
    const p = e.detail.totalProgress || 0;
    const displayed = jsLoaded ? (0.3 + p * 0.7) : 0.3 * p;
    setProgress(displayed, p < 1 ? '载入模型 ' + Math.round(p*100) + '%' : '渲染中...');
  });
  mv.addEventListener('load', () => {
    glbLoaded = true;
    if (mv.updateFraming) mv.updateFraming();
    // 抓 node 引用（多次尝试，model-viewer 可能延迟 attach）
    const tryGrab = (attempts = 0) => {
      if (grabNodes() || attempts >= 10) {
        hideLoader();
        return;
      }
      setTimeout(() => tryGrab(attempts + 1), 100);
    };
    tryGrab();
  }, { once: true });

  let jsProgress = 0;
  const jsTick = setInterval(() => {
    jsProgress = Math.min(0.28, jsProgress + 0.015);
    if (!jsLoaded) setProgress(jsProgress, '加载 3D 引擎...');
  }, 180);

  (async () => {
    try {
      if (!window.customElements || !customElements.get('model-viewer')) {
        await customElements.whenDefined('model-viewer');
      }
      jsLoaded = true;
      clearInterval(jsTick);
      setProgress(0.3, '引擎就绪，载入模型...');
      mv.setAttribute('src', window.__GLB_COMBINED__);
    } catch (e) {
      stageEl.textContent = '引擎加载失败，请用浏览器打开';
    }
  })();

  setTimeout(() => {
    if (!glbLoaded) {
      stageEl.innerHTML = '网络较慢，建议用<br>浏览器打开（右上···菜单）';
    }
  }, 20000);
})();
</script>

</body>
</html>
